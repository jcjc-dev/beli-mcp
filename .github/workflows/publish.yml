name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC provenance for npm + MCP Registry auth

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Publish beli-mcp to npm (with provenance)
        run: npm publish --workspace beli-mcp --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-registry:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MCP Registry publisher
        run: |
          curl -sSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m).tar.gz" \
            | tar xz mcp-publisher || echo "skip if release asset naming changed"
      - name: Login + publish to MCP Registry (GitHub OIDC)
        working-directory: packages/mcp-server
        run: |
          ../../mcp-publisher login github-oidc
          ../../mcp-publisher publish
